version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      frontend-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - javascript

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      rust-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - rust

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - ci
