<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Miniverto local-first architecture</title>
  <desc id="desc">A system diagram showing the React UI, Tauri command bridge, Rust native layer, SQLite, OS keyring, local models, and optional cloud providers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9f3ea"/>
      <stop offset="100%" stop-color="#eef5f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#4b3b2c" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#4f8b6b"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <text x="70" y="82" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="750" fill="#231a13">Local-first desktop architecture</text>
  <text x="70" y="122" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#74685f">User data stays local by default. Provider calls are explicit and configurable.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="190" width="260" height="250" rx="22" fill="#ffffff" stroke="#e7d8c8"/>
    <text x="112" y="238" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="750" fill="#2f2318">React UI</text>
    <text x="112" y="280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#75675c">Projects</text>
    <text x="112" y="310" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#75675c">Materials</text>
    <text x="112" y="340" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#75675c">Notes</text>
    <text x="112" y="370" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#75675c">Assessments</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="190" width="260" height="250" rx="22" fill="#ffffff" stroke="#d5e3d7"/>
    <text x="502" y="238" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="750" fill="#2f2318">Tauri + Rust</text>
    <text x="502" y="280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#75675c">Command bridge</text>
    <text x="502" y="310" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#75675c">SQLite stores</text>
    <text x="502" y="340" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#75675c">Keyring bridge</text>
    <text x="502" y="370" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#75675c">Material services</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="160" width="250" height="120" rx="22" fill="#ffffff" stroke="#d5e3d7"/>
    <text x="892" y="208" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" fill="#2f2318">Local storage</text>
    <text x="892" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#75675c">SQLite app database</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="330" width="250" height="120" rx="22" fill="#ffffff" stroke="#d5e3d7"/>
    <text x="892" y="378" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" fill="#2f2318">Secrets</text>
    <text x="892" y="416" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#75675c">OS credential store</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="275" y="500" width="650" height="72" rx="22" fill="#ffffff" stroke="#eadccd"/>
    <text x="315" y="544" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="720" fill="#2f2318">Optional model providers</text>
    <text x="570" y="544" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#75675c">Ollama, local relay, OpenAI-compatible endpoints</text>
  </g>

  <path d="M350 315 H450" stroke="#4f8b6b" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M740 245 H840" stroke="#4f8b6b" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M740 375 H840" stroke="#4f8b6b" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M600 445 V480" stroke="#bd8555" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M980 500 C980 476 976 466 970 452" stroke="#bd8555" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <rect x="70" y="470" width="210" height="40" rx="20" fill="#f5e5d4" stroke="#e3c7a9"/>
  <text x="96" y="496" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="680" fill="#7a542f">Default: local data</text>

  <rect x="70" y="520" width="210" height="40" rx="20" fill="#dfeee5" stroke="#b7d3c0"/>
  <text x="96" y="546" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="680" fill="#3e7358">Explicit: provider calls</text>
</svg>
