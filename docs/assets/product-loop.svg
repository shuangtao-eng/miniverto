<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Miniverto learning loop</title>
  <desc id="desc">A product flow showing how Miniverto turns goals, profile, materials, planning, learning, notes, assessment, and re-planning into an adaptive learning loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#eef7f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#5f4b36" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#bd8555"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <text x="70" y="82" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="750" fill="#231a13">From vague goal to adaptive plan</text>
  <text x="70" y="122" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#74685f">Miniverto keeps the learning loop close to the learner, their materials, and their progress.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="188" width="210" height="150" rx="18" fill="#ffffff" stroke="#eadccd"/>
    <text x="96" y="232" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#2f2318">Goal</text>
    <text x="96" y="266" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">What do you want to learn?</text>
    <text x="96" y="292" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">Why now? What counts as success?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="188" width="210" height="150" rx="18" fill="#ffffff" stroke="#eadccd"/>
    <text x="386" y="232" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#2f2318">Profile</text>
    <text x="386" y="266" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">Background, blockers, time budget,</text>
    <text x="386" y="292" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">devices, and learning preferences.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="188" width="210" height="150" rx="18" fill="#ffffff" stroke="#eadccd"/>
    <text x="676" y="232" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#2f2318">Materials</text>
    <text x="676" y="266" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">Notes, Markdown, text extracts,</text>
    <text x="676" y="292" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">and future document parsing.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="930" y="188" width="200" height="150" rx="18" fill="#ffffff" stroke="#eadccd"/>
    <text x="956" y="232" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#2f2318">Plan</text>
    <text x="956" y="266" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">Milestones, tasks, criteria,</text>
    <text x="956" y="292" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">and practical next actions.</text>
  </g>

  <path d="M286 263 H340" stroke="#bd8555" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M576 263 H630" stroke="#bd8555" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M866 263 H910" stroke="#bd8555" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <g filter="url(#shadow)">
    <rect x="210" y="420" width="220" height="132" rx="18" fill="#ffffff" stroke="#d8e6da"/>
    <text x="236" y="462" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#2f2318">Learn</text>
    <text x="236" y="494" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">Focused task pages with</text>
    <text x="236" y="518" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">lesson flow and resources.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="490" y="420" width="220" height="132" rx="18" fill="#ffffff" stroke="#d8e6da"/>
    <text x="516" y="462" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#2f2318">Reflect</text>
    <text x="516" y="494" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">Task notes and durable</text>
    <text x="516" y="518" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">knowledge notes.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="420" width="220" height="132" rx="18" fill="#ffffff" stroke="#d8e6da"/>
    <text x="796" y="462" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#2f2318">Assess</text>
    <text x="796" y="494" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">Checks expose weak bands</text>
    <text x="796" y="518" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#75675c">and trigger re-planning.</text>
  </g>

  <path d="M1028 340 C1030 388 1000 430 996 475" stroke="#bd8555" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M766 486 H730" stroke="#bd8555" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M486 486 H450" stroke="#bd8555" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M208 486 C114 472 84 406 94 340" stroke="#bd8555" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
</svg>
